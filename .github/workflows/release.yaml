name: Release

on:
    push:
        tags:
            - v[0-9]+.*

jobs:
    build:
        name: Build

        permissions:
            contents: read

        runs-on: ubuntu-latest
        steps:
            - name: Checkout the repo
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - name: Setup pnpm
              uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

            - name: Install Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install

            - name: Test
              run: pnpm test

            - name: Build
              run: pnpm build && mv "github-review-context.xpi" "github-review-context-${{ github.ref_name }}.xpi"

            - name: Upload xpi as artifacts
              id: artifact-upload-step
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  path: "github-review-context-*.xpi"

        outputs:
            artifact-id: "${{ steps.artifact-upload-step.outputs.artifact-id }}"

    release:
        name: Draft Release

        needs:
            - build

        permissions:
            contents: write

        runs-on: ubuntu-latest
        steps:
            - name: Download all workflow run artifacts
              id: artifact-download-step
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  artifact-ids: "${{ needs.build.outputs.artifact-id }}"

            - name: Create the Github release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  gh --repo ${{ github.repository }} \
                    release create \
                    --title "${{ github.ref_name }}" \
                    --draft \
                    ${{ github.ref_name }} \
                    "${{ steps.artifact-download-step.outputs.download-path }}/*"
